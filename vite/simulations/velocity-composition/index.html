<!doctype html>
<html lang="ja">
  <head>
    <title>速度の合成</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/js/common.js"></script>
    <link href="./css/style.css" rel="stylesheet" vite-ignore />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">速度の合成</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- 設定パネル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <div class="settings-content">
          <h5>設定</h5>
          <div class="mb-3">
            <label for="riverSpeedInput" class="form-label">
              川の速度（左向き固定）:
              <span id="riverSpeedValue">3.0</span> m/s
            </label>
            <input
              type="range"
              class="form-range"
              id="riverSpeedInput"
              min="0"
              max="10"
              step="0.5"
              value="3"
            />
          </div>
          <div class="mb-3">
            <label for="boatSpeedInput" class="form-label"
              >船の速度（水に対して）:</label
            >
            <div id="boatSpeedValue" class="speed-label">
              5.0 m/s ← 下流
            </div>
            <input
              type="range"
              class="form-range"
              id="boatSpeedInput"
              min="-10"
              max="10"
              step="0.5"
              value="5"
            />
            <small class="text-secondary"
              >← 下流方向（+）/ → 上流方向（−）</small
            >
          </div>
          <button id="closeModal" class="btn btn-secondary w-100 mt-2">
            閉じる
          </button>
        </div>
      </div>

      <!-- 左下コントロール -->
      <div class="left-bottom-controls">
        <button id="resetButton" class="btn btn-primary">リセット</button>
        <button id="playPauseButton" class="btn btn-success">開始</button>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls">
        <button id="toggleModal" class="btn btn-info">⚙ 設定</button>
      </div>
    </div>

    <script
      type="text/javascript"
      src="./js/class.js"
      vite-ignore
    ></script>
    <script
      type="text/javascript"
      src="./js/function.js"
      vite-ignore
    ></script>
    <script
      type="text/javascript"
      src="./js/elementFunction.js"
      vite-ignore
    ></script>
    <script
      type="text/javascript"
      src="./js/init.js"
      vite-ignore
    ></script>
    <script
      type="text/javascript"
      src="./js/index.js"
      vite-ignore
    ></script>
  </body>
</html>
