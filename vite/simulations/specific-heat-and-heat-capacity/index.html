<!doctype html>
<html lang="ja">
  <head>
    <title>比熱と熱容量</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">比熱と熱容量</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- 設定モーダル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <div class="modal-content-inner">
          <h5>設定</h5>
          <div class="mb-3">
            <label for="materialSelectA" class="form-label">物質A</label>
            <select class="form-select" id="materialSelectA">
              <option value="0">アルミニウム</option>
              <option value="1">鉄</option>
              <option value="2">銅</option>
              <option value="3">銀</option>
              <option value="4">水銀</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="massSelectA" class="form-label">物質Aの質量</label>
            <select class="form-select" id="massSelectA">
              <option value="1" selected>質量(小) 0.1kg</option>
              <option value="0">質量(大) 0.3kg</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="materialSelectB" class="form-label">物質B</label>
            <select class="form-select" id="materialSelectB">
              <option value="0">アルミニウム</option>
              <option value="1">鉄</option>
              <option value="2">銅</option>
              <option value="3">銀</option>
              <option value="4">水銀</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="massSelectB" class="form-label">物質Bの質量</label>
            <select class="form-select" id="massSelectB">
              <option value="0" selected>質量(大) 0.3kg</option>
              <option value="1">質量(小) 0.1kg</option>
            </select>
          </div>
          <button id="closeModal" class="btn btn-secondary w-100">閉じる</button>
        </div>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls">
        <button id="toggleModal" class="btn btn-info">⚙ 設定</button>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
