<!doctype html>
<html lang="ja">
  <head>
    <title>縦波と横波</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>
  <body class="bg-dark" oncontextmenu="return false;">
    <nav class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top" data-bs-theme="dark" id="navBar">
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">縦波と横波</span>
      </div>
    </nav>
    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>
      <div class="position-absolute bottom-0 start-0 m-3 d-flex align-items-center">
        <button type="button" class="btn btn-primary m-1" id="startStopButton">スタート</button>
        <button type="button" class="btn btn-secondary m-1" id="resetButton">リセット</button>
        <label class="text-light m-1">速度:</label>
        <input type="range" class="form-range m-1" id="timesSlider" min="10" max="60" value="30" style="width:120px">
      </div>
    </div>
    <script type="module" src="./js/index.js"></script>
  </body>
</html>
