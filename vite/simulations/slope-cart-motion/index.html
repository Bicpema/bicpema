<!doctype html>
<html lang="ja">
  <head>
    <title>斜面をくだる力学台車の運動</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">斜面をくだる力学台車の運動</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- モーダルパネル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <div class="modal-content-inner">
          <h5>設定</h5>
          <div class="mb-3">
            <label for="angleInput" class="form-label">斜面の角度 (°)</label>
            <input
              type="number"
              class="form-control"
              id="angleInput"
              min="0"
              max="30"
              value="20"
              step="1"
            />
          </div>
          <div class="mb-3">
            <label for="intervalInput" class="form-label">記録間隔 (s)</label>
            <select class="form-select" id="intervalInput">
              <option value="0.05">0.05 s</option>
              <option value="0.1" selected>0.1 s</option>
              <option value="0.2">0.2 s</option>
            </select>
          </div>
          <button id="closeModal" class="btn btn-secondary w-100">
            閉じる
          </button>
        </div>
      </div>

      <!-- 左下コントロール -->
      <div class="left-bottom-controls">
        <button id="resetButton" class="btn btn-primary">🔄 リセット</button>
        <button id="playPauseButton" class="btn btn-success">▶ 開始</button>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls">
        <button id="toggleModal" class="btn btn-info">⚙ 設定</button>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
