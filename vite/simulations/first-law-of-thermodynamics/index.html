<!doctype html>
<html lang="ja">
  <head>
    <title>熱力学第一法則</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>
  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">熱力学第一法則</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- モーダルパネル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <div class="modal-content">
          <h5>設定</h5>
          <div class="mb-3">
            <label class="form-label">加えた熱量 Q</label>
            <div class="d-flex flex-column gap-2">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="qValue"
                  id="q0"
                  value="0"
                  checked
                />
                <label class="form-check-label" for="q0">0 [J]</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="qValue"
                  id="q1"
                  value="1"
                />
                <label class="form-check-label" for="q1">Q [J]</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="qValue"
                  id="q2"
                  value="2"
                />
                <label class="form-check-label" for="q2">2Q [J]</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="qValue"
                  id="q3"
                  value="3"
                />
                <label class="form-check-label" for="q3">3Q [J]</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="qValue"
                  id="q4"
                  value="4"
                />
                <label class="form-check-label" for="q4">4Q [J]</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="qValue"
                  id="q5"
                  value="5"
                />
                <label class="form-check-label" for="q5">5Q [J]</label>
              </div>
            </div>
          </div>
          <button id="closeModal" class="btn btn-secondary w-100">
            閉じる
          </button>
        </div>
      </div>

      <!-- 左下コントロール -->
      <div class="left-bottom-controls">
        <button id="resetButton" class="btn btn-secondary">リセット</button>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls">
        <button id="toggleModal" class="btn btn-info">設定</button>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
