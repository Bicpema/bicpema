<!doctype html>
<html lang="ja">
  <head>
    <title>波の反射</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-dark" oncontextmenu="return false;">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">波の反射</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <div class="position-absolute bottom-0 start-0 m-3">
        <a class="btn btn-primary m-1" id="startButton">波の発射</a>
        <a class="btn btn-secondary m-1" id="stopButton">一時停止</a>
        <a class="btn btn-secondary m-1" id="restartButton">再開</a>
        <a class="btn btn-danger m-1" id="resetButton">リセット</a>
      </div>

      <div
        class="position-absolute end-0 me-3"
        style="top: 4.2rem; z-index: 1100"
      >
        <button
          type="button"
          class="btn btn-primary white"
          data-bs-toggle="modal"
          data-bs-target="#simulationSettingModal"
        >
          シミュレーションの設定
        </button>
      </div>
    </div>

    <div
      class="modal fade"
      id="simulationSettingModal"
      tabindex="-1"
      aria-labelledby="simulationSettingModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="simulationSettingModalLabel">
              シミュレーションの設定
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="form-floating mb-3" id="floatingSelect">
              <select class="form-select" id="reflectSelect">
                <option>固定端反射</option>
                <option>自由端反射</option>
              </select>
              <label for="floatingSelect"
                >波の反射の仕方を選択してください。</label
              >
            </div>
            <div class="form-floating mb-3" id="floatingSelectWave">
              <select class="form-select" id="waveSelect">
                <option>sin波</option>
                <option>-sin波</option>
              </select>
              <label for="floatingSelectWave"
                >波の種類を選択してください。</label
              >
            </div>
            <div class="mb-2">
              <label>波の情報を入力してください。</label>
            </div>
            <div class="input-group">
              <div class="form-floating col m-0">
                <input
                  type="number"
                  class="form-control"
                  placeholder="速度"
                  value="1"
                  id="speedInput"
                  min="0"
                />
                <label for="speedInput">波の速度</label>
              </div>
              <div class="form-floating col m-0">
                <input
                  type="number"
                  class="form-control"
                  placeholder="振幅"
                  value="1"
                  id="amplitudeInput"
                />
                <label for="amplitudeInput">波の振幅</label>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              閉じる
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
