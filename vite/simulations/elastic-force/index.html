<!doctype html>
<html lang="ja">
  <head>
    <title>弾性力</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="../../lib/p5.min.js"></script>
    <link href="../../lib/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/style.css" rel="stylesheet" vite-ignore />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">弾性力</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- モーダルパネル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <div class="modal-content">
          <h5>設定</h5>
          <div class="mb-3">
            <label for="springConstantInput" class="form-label"
              >ばね定数 k (N/m)</label
            >
            <input
              type="range"
              class="form-range"
              id="springConstantInput"
              min="5"
              max="100"
              value="20"
              step="5"
            />
            <div class="d-flex justify-content-between">
              <small class="text-white-50">5 N/m</small>
              <span id="springConstantDisplay" class="text-white fw-bold"
                >20 N/m</span
              >
              <small class="text-white-50">100 N/m</small>
            </div>
          </div>
          <button id="resetButton" class="btn btn-secondary w-100 mb-2">
            リセット
          </button>
          <button id="closeModal" class="btn btn-secondary w-100">
            閉じる
          </button>
        </div>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls">
        <button id="toggleModal" class="btn btn-info">設定</button>
      </div>
    </div>
    <script type="module" src="./js/index.js" vite-ignore></script>
  </body>
</html>
