<!doctype html>
<html lang="ja">
  <head>
    <title>作用反作用の法則</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">作用反作用の法則</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- 設定モーダル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <div class="modal-content-inner">
          <h5>設定</h5>
          <div class="mb-3">
            <label for="massAInput" class="form-label">物体Aの質量 m₁ (kg)</label>
            <input
              type="number"
              class="form-control"
              id="massAInput"
              min="0.5"
              max="5"
              value="2"
              step="0.5"
            />
          </div>
          <div class="mb-3">
            <label for="massBInput" class="form-label">物体Bの質量 m₂ (kg)</label>
            <input
              type="number"
              class="form-control"
              id="massBInput"
              min="0.5"
              max="5"
              value="2"
              step="0.5"
            />
          </div>
          <button id="closeModal" class="btn btn-outline-secondary w-100">
            閉じる
          </button>
        </div>
      </div>

      <!-- 左下コントロール -->
      <div class="left-bottom-controls">
        <button id="startButton" class="btn btn-success">開始</button>
        <button id="resetButton" class="btn btn-danger">リセット</button>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls">
        <button id="toggleModal" class="btn btn-info">設定</button>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
