<!doctype html>
<html lang="ja">
  <head>
    <title>等加速度直線運動</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" vite-ignore />
  </head>

  <body class="bg-dark" oncontextmenu="return false;">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">等加速度直線運動</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- 設定モーダルパネル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <div class="modal-content-inner">
          <h5>設定</h5>
          <div class="mb-3">
            <label for="initialVelocityInput" class="form-label"
              >初速度 v₀ (m/s)</label
            >
            <input
              type="number"
              class="form-control"
              id="initialVelocityInput"
              min="0"
              max="20"
              value="0"
              step="1"
            />
          </div>
          <div class="mb-3">
            <label for="accelerationInput" class="form-label"
              >加速度 a (m/s²)</label
            >
            <input
              type="number"
              class="form-control"
              id="accelerationInput"
              min="1"
              max="10"
              value="2"
              step="1"
            />
          </div>
          <div class="form-check mb-3">
            <input
              class="form-check-input"
              type="checkbox"
              id="showMarkersCheckBox"
              checked
            />
            <label class="form-check-label" for="showMarkersCheckBox"
              >等時間マーカーの表示</label
            >
          </div>
          <button id="closeModal" class="btn btn-secondary w-100">
            閉じる
          </button>
        </div>
      </div>

      <!-- 左下コントロール -->
      <div class="left-bottom-controls">
        <button id="resetButton" class="btn btn-primary">🔄 リセット</button>
        <button id="playPauseButton" class="btn btn-success">▶ 開始</button>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls">
        <button id="toggleModal" class="btn btn-info">⚙ 設定</button>
      </div>
    </div>
    <script type="module" src="./js/index.js"></script>
  </body>
</html>
