<!doctype html>
<html lang="ja">
  <head>
    <title>熱量の保存と比熱</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">熱量の保存と比熱</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- モーダルパネル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <h5>設定</h5>

        <!-- 物質A選択 -->
        <div class="mb-3">
          <label class="form-label">物質A選択</label>
          <div id="materialRadioGroup">
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="materialRadio"
                id="materialAl"
                value="0"
                checked
              />
              <label class="form-check-label" for="materialAl"
                >アルミニウム</label
              >
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="materialRadio"
                id="materialFe"
                value="1"
              />
              <label class="form-check-label" for="materialFe">鉄</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="materialRadio"
                id="materialCu"
                value="2"
              />
              <label class="form-check-label" for="materialCu">銅</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="materialRadio"
                id="materialAg"
                value="3"
              />
              <label class="form-check-label" for="materialAg">銀</label>
            </div>
          </div>
        </div>

        <!-- 質量A選択 -->
        <div class="mb-3">
          <label class="form-label">質量A選択</label>
          <div id="massRadioGroup">
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="massRadio"
                id="mass50"
                value="1"
                checked
              />
              <label class="form-check-label" for="mass50">50 g</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="massRadio"
                id="mass100"
                value="0"
              />
              <label class="form-check-label" for="mass100">100 g</label>
            </div>
          </div>
        </div>

        <!-- 接触状態 -->
        <div class="mb-3">
          <label for="contactStateSelect" class="form-label">接触状態</label>
          <select class="form-select form-select-sm" id="contactStateSelect">
            <option value="0">接触させる</option>
            <option value="1" selected>接触前に戻す</option>
          </select>
        </div>

        <button id="closeModal" class="btn btn-secondary w-100">閉じる</button>
      </div>

      <!-- 左下コントロール -->
      <div class="left-bottom-controls">
        <button id="resetButton" class="btn btn-primary">リセット</button>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls">
        <button id="toggleModal" class="btn btn-info">設定</button>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
