<!doctype html>
<html lang="ja">
  <head>
    <title>ドップラー効果</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">ドップラー効果</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- モーダルパネル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <div class="modal-content">
          <h5>設定</h5>
          <div class="mb-3">
            <label for="speedInput" class="form-label">音源の速度 (m/s)</label>
            <input
              type="number"
              class="form-control"
              id="speedInput"
              min="0"
              max="1000"
              value="340"
              step="1"
            />
          </div>
          <button id="closeModal" class="btn btn-secondary w-100">閉じる</button>
        </div>
      </div>

      <!-- 左下コントロール -->
      <div class="left-bottom-controls">
        <button id="startButton" class="btn btn-primary">スタート</button>
        <button id="stopButton" class="btn btn-danger">ストップ</button>
        <button id="resetButton" class="btn btn-secondary">リセット</button>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls">
        <button id="settingsButton" class="btn btn-info">設定</button>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
