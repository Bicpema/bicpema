<!doctype html>
<html lang="ja">
  <head>
    <title>アルキメデスの原理</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/js/common.js"></script>
    <link href="./css/style.css" rel="stylesheet" vite-ignore />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">アルキメデスの原理</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- 設定パネル -->
      <div
        class="position-absolute top-0 end-0 m-3 card collapse col-sm-5 col-lg-3"
        id="settingsPanel"
      >
        <div class="card-body">
          <h6 class="card-title">設定</h6>
          <div class="mb-3">
            <label for="densitySlider" class="form-label"
              >円柱の密度: <span id="densityValue">1.0</span> g/cm³</label
            >
            <input
              type="range"
              class="form-range"
              id="densitySlider"
              min="0.1"
              max="2.0"
              step="0.05"
              value="1.0"
            />
          </div>
          <div class="mb-1 text-secondary" style="font-size: 0.85em">
            水の密度: 1.0 g/cm³
          </div>
          <div class="mb-1 text-secondary" id="submergedRatioLabel" style="font-size: 0.85em">
            水中体積比: 100%
          </div>
        </div>
      </div>
    </div>

    <!-- 下部ボタン -->
    <div class="position-absolute bottom-0 start-0 m-2 d-flex gap-2">
      <button
        type="button"
        class="btn btn-primary"
        id="startButton"
      >
        ▶ 開始
      </button>
      <button
        type="button"
        class="btn btn-secondary"
        id="resetButton"
      >
        🔄 リセット
      </button>
    </div>

    <!-- 右上の設定ボタン -->
    <div class="position-absolute top-0 end-0 m-2" style="margin-top: 60px !important;">
      <button
        type="button"
        class="btn btn-outline-light"
        id="settingsButton"
        data-bs-toggle="collapse"
        data-bs-target="#settingsPanel"
        aria-expanded="false"
      >
        ⚙ 設定
      </button>
    </div>

    <script
      type="module"
      src="./js/index.js"
      vite-ignore
    ></script>
  </body>
</html>
