<!doctype html>
<html lang="ja">
  <head>
    <title>力の合成</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" vite-ignore />
  </head>

  <body class="bg-dark" oncontextmenu="return false;">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">力の合成</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- 設定パネル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <div class="settings-content">
          <h5>設定</h5>
          <div class="mb-3">
            <label for="f1MagInput" class="form-label">
              F₁ の大きさ:
              <span id="f1MagValue">60</span> N
            </label>
            <input
              type="range"
              class="form-range"
              id="f1MagInput"
              min="0"
              max="100"
              step="5"
              value="60"
            />
          </div>
          <div class="mb-3">
            <label for="f1AngleInput" class="form-label">
              F₁ の向き:
              <span id="f1AngleValue">30</span>°
            </label>
            <input
              type="range"
              class="form-range"
              id="f1AngleInput"
              min="-180"
              max="180"
              step="5"
              value="30"
            />
          </div>
          <div class="mb-3">
            <label for="f2MagInput" class="form-label">
              F₂ の大きさ:
              <span id="f2MagValue">40</span> N
            </label>
            <input
              type="range"
              class="form-range"
              id="f2MagInput"
              min="0"
              max="100"
              step="5"
              value="40"
            />
          </div>
          <div class="mb-3">
            <label for="f2AngleInput" class="form-label">
              F₂ の向き:
              <span id="f2AngleValue">120</span>°
            </label>
            <input
              type="range"
              class="form-range"
              id="f2AngleInput"
              min="-180"
              max="180"
              step="5"
              value="120"
            />
          </div>
          <button id="closeModal" class="btn btn-secondary w-100 mt-2">
            閉じる
          </button>
        </div>
      </div>

      <!-- 左下コントロール -->
      <div class="left-bottom-controls">
        <button id="resetButton" class="btn btn-primary">リセット</button>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls">
        <button id="toggleModal" class="btn btn-info">⚙ 設定</button>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
