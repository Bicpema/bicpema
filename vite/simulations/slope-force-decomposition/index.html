<!doctype html>
<html lang="ja">
  <head>
    <title>斜面の力の分解</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" vite-ignore />
  </head>

  <body class="bg-dark" oncontextmenu="return false;">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">斜面の力の分解</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- 設定パネル -->
      <div id="settingsModal" class="settings-modal" style="display: none">
        <div class="settings-content">
          <h5>シミュレーションの設定</h5>

          <div class="mb-3">
            <label class="form-label">
              質量: <span id="massValue">10 kg</span>
            </label>
            <input
              type="range"
              class="form-range"
              id="massInput"
              min="1"
              max="30"
              step="1"
              value="10"
            />
          </div>
          <div class="mb-3">
            <label class="form-label">
              斜面の角度: <span id="slopeAngleValue">30°</span>
            </label>
            <input
              type="range"
              class="form-range"
              id="slopeAngleInput"
              min="0"
              max="80"
              step="1"
              value="30"
            />
          </div>

          <button id="closeModal" class="btn btn-secondary w-100 mt-2">
            閉じる
          </button>
        </div>
      </div>

      <!-- 右上コントロール -->
      <div class="right-top-controls" id="rightTopControls">
        <button id="toggleModal" class="btn btn-info">⚙ 設定</button>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
